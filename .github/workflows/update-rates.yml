name: Update FX History

on:
  workflow_dispatch:
  schedule:
    - cron: "5 1 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-history:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit_push.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update history data
        env:
          EXCHANGE_RATE_API_KEY: ${{ secrets.EXCHANGE_RATE_API_KEY }}
        run: |
          node scripts/fetch_rates.mjs
          node scripts/validate_history.mjs

      - name: Commit and push changes
        id: commit_push
        run: |
          if git diff --quiet -- site/data/history.json; then
            echo "No history changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/history.json
          git commit -m "chore(data): update fx history"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

  deploy-pages:
    needs: update-history
    if: needs.update-history.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
